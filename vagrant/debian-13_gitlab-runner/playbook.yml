---
- name: Install GitLab Runner
  hosts: all
  become: true

  vars:
    gitlab_runner_binary: "https://s3.dualstack.us-east-1.amazonaws.com/gitlab-runner-downloads/latest/binaries/gitlab-runner-linux-amd64"

  tasks:

    - name: Set up Docker's apt repository
      ansible.builtin.script: ./docker.sh

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin

    - name: Ensure docker.service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Install GitLab Runner binary
      ansible.builtin.get_url:
        url: "{{ gitlab_runner_binary }}"
        dest: /usr/local/bin/gitlab-runner
        mode: 755

    - name: Create gitlab-runner user
      ansible.builtin.user:
        name: gitlab-runner
        shell: /bin/bash
        create_home: yes
        comment: "GitLab Runner"

    - name: Check if gitlab-runner service exists
      ansible.builtin.stat:
        path: /etc/systemd/system/gitlab-runner.service
      register: runner_service

    - name: Install GitLab runner as a service
      ansible.builtin.command: >
        gitlab-runner install --user=gitlab-runner --working-directory=/home/gitlab-runner
      when: not runner_service.stat.exists

    - name: Ensure GitLab Runner is running
      ansible.builtin.service:
        name: gitlab-runner
        state: started
        enabled: yes

